name: Deploy godnote viewer
# godnote workspace template v2

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Prepare viewer
        run: |
          rm -rf dist
          mkdir -p dist/data
          cp -R manifest.json dist/data/manifest.json
          cp -R subjects dist/data/
          cp -R notes dist/data/
          cp -R viewer/index.html dist/index.html
          cp -R viewer/viewer.html dist/viewer.html
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

